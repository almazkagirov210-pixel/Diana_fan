<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Дианы ❤️</title>
    <style>
        /* ===== Базовые стили ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #050507;
            color: white;
            text-align: center;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            opacity: 0;
            animation: fadeInPage 1.5s ease forwards;
        }

        @keyframes fadeInPage {
            to { opacity: 1; }
        }

        /* Фоновое мерцание */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, #ff1a8c10 0%, #050507 80%);
            pointer-events: none;
            z-index: -1;
            animation: bgFlicker 5s infinite;
        }

        @keyframes bgFlicker {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }

        /* ===== Заголовок ===== */
        .title {
            font-size: clamp(40px, 12vw, 80px);
            margin: 40px 20px 20px;
            color: #ff4da6;
            text-shadow:
                0 0 5px #ff4da6,
                0 0 15px #ff4da6,
                0 0 30px #ff1a8c,
                0 0 60px #ff1a8c;
            animation: glowPulse 2s infinite alternate;
            letter-spacing: 4px;
        }

        @keyframes glowPulse {
            from { text-shadow: 0 0 5px #ff4da6, 0 0 15px #ff4da6, 0 0 30px #ff1a8c; }
            to { text-shadow: 0 0 15px #ff4da6, 0 0 30px #ff4da6, 0 0 60px #ff1a8c, 0 0 90px #ff1a8c; }
        }

        /* ===== Неоновое сообщение ===== */
        .message {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
            font-size: clamp(18px, 4vw, 26px);
            line-height: 1.6;
            color: #ffb3d9;
            text-shadow:
                0 0 3px #ff4da6,
                0 0 8px #ff4da6,
                0 0 15px #ff1a8c;
            white-space: pre-line;
            overflow: hidden;
            border-right: 3px solid #ff4da6;
            animation: typing 5s steps(70, end), blink .8s infinite, neonFlicker 3s infinite;
            margin-bottom: 40px;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        @keyframes neonFlicker {
            0%, 100% { text-shadow: 0 0 3px #ff4da6, 0 0 8px #ff4da6, 0 0 15px #ff1a8c; }
            33% { text-shadow: 0 0 5px #ff4da6, 0 0 12px #ff4da6, 0 0 25px #ff1a8c; }
            66% { text-shadow: 0 0 2px #ff4da6, 0 0 5px #ff4da6, 0 0 10px #ff1a8c; }
        }

        /* ===== Сетка с фото (сердце) ===== */
        .heart-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto 40px;
            padding: 10px;
        }

        .photo {
            width: 100%;
            aspect-ratio: 1 / 1;
            clip-path: path("M80 30 C80 -10,0 -10,0 50 C0 90,80 140,80 140 C80 140,160 90,160 50 C160 -10,80 -10,80 30 Z");
            overflow: hidden;
            box-shadow: 0 0 15px #ff4da6;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: photoGlow 2s infinite alternate;
            background: #2a1a2a;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .photo.visible {
            opacity: 1;
        }

        .photo:hover {
            transform: scale(1.08) rotate(1deg);
            box-shadow: 0 0 30px #ff4da6;
        }

        .photo:hover img {
            transform: scale(1.05);
        }

        @keyframes photoGlow {
            from { box-shadow: 0 0 8px #ff4da6; }
            to { box-shadow: 0 0 25px #ff4da6, 0 0 50px #ff1a8c; }
        }

        /* ===== Адаптация для мобильных ===== */
        @media (max-width: 600px) {
            .heart-grid {
                gap: 3px;
                padding: 5px;
            }
        }

        /* ===== Подвал ===== */
        .footer {
            margin: 40px 0 60px;
            font-size: 18px;
            opacity: 0.9;
            color: #ffb3d9;
            text-shadow: 0 0 8px #ff4da6;
            animation: footerFade 3s infinite;
        }

        @keyframes footerFade {
            0%,100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* ===== Летающие сердечки ===== */
        .heart-float {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: float 6s linear forwards;
            z-index: 10;
            filter: drop-shadow(0 0 5px #ff4da6);
            will-change: transform, opacity;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ===== Кнопка музыки ===== */
        #musicButton {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff4da6, #ff1a8c);
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 25px #ff4da6;
            z-index: 1000;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #musicButton:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff4da6;
        }

        #musicButton.playing {
            background: linear-gradient(135deg, #3a1f3a, #2a1a2a);
            box-shadow: 0 0 15px #ff4da6;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1 class="title">DIANA ❤️</h1>

    <div class="message">
        Диана ❤️

        Сегодня не праздник
        и не какой-то особенный день.

        Я просто хотел сделать
        тебе маленький сюрприз.

        Чтобы ты улыбнулась :)
    </div>

    <!-- Сетка для фото -->
    <div class="heart-grid" id="heartGrid"></div>

    <div class="footer">Сделано специально для тебя ❤️</div>

    <!-- Кнопка управления музыкой -->
    <button id="musicButton">🎵 Включить музыку</button>
    <audio id="bgMusic" loop preload="auto">
        <source src="s2m1ngrdwpt03s8828hi.m4a" type="audio/mp4">
        Ваш браузер не поддерживает аудио.
    </audio>

    <script>
        (function() {
            // === 1. Массив с фотографиями (замените при необходимости) ===
            const myPhotos = [
                'photo_1_2026-03-11_05-15-40.jpg',
                'photo_2_2026-03-11_05-15-40.jpg',
                'photo_3_2026-03-11_05-15-40.jpg',
                'photo_4_2026-03-11_05-15-40.jpg',
                'photo_5_2026-03-11_05-15-40.jpg'
            ];

            // === 2. Генерация сердечка из фото ===
            const grid = document.getElementById('heartGrid');
            const rows = 10;
            const cols = 10;

            // Функция проверки принадлежности к сердцу
            function isInHeart(row, col) {
                // Нормализация координат от -1.5 до 1.5
                const x = (col - 4.5) / 4.5 * 1.5;
                const y = -((row - 4.5) / 4.5 * 1.5); // Переворачиваем правильно
                // Формула сердца: (x² + y² - 1)³ - x²·y³ ≤ 0
                const val = Math.pow(x * x + y * y - 1, 3) - x * x * Math.pow(y, 3);
                return val <= 0;
            }

            const heartCells = [];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const photoDiv = document.createElement('div');
                    photoDiv.className = 'photo';

                    if (!isInHeart(r, c)) {
                        // Пустые ячейки (не в сердце) делаем невидимыми
                        photoDiv.style.opacity = '0';
                        photoDiv.style.pointerEvents = 'none';
                        photoDiv.style.animation = 'none';
                        photoDiv.style.boxShadow = 'none';
                    } else {
                        const img = document.createElement('img');
                        // Берём фото циклически из массива
                        img.src = myPhotos[(r * cols + c) % myPhotos.length];
                        img.alt = '❤️';
                        photoDiv.appendChild(img);

                        // Сохраняем для анимации появления
                        heartCells.push({
                            element: photoDiv,
                            distance: Math.sqrt(Math.pow(r - 4.5, 2) + Math.pow(c - 4.5, 2))
                        });
                    }
                    grid.appendChild(photoDiv);
                }
            }

            // Анимация появления сердца от центра к краям
            heartCells.sort((a, b) => a.distance - b.distance);
            heartCells.forEach((cell, index) => {
                setTimeout(() => {
                    cell.element.classList.add('visible');
                }, index * 25); // Плавное появление
            });

            // === 3. Летающие сердечки (много!) ===
            const symbols = ['❤️', '💖', '💕', '💗', '💓', '💘', '💝'];
            function createFloatingHeart() {
                const heart = document.createElement('div');
                heart.className = 'heart-float';
                heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = (Math.random() * 100 + 10) + 'vh'; // начинают чуть ниже верха
                heart.style.animationDuration = (4 + Math.random() * 8) + 's'; // 4-12 сек
                heart.style.fontSize = (15 + Math.floor(Math.random() * 35)) + 'px';
                heart.style.opacity = Math.random() * 0.6 + 0.2;
                document.body.appendChild(heart);

                heart.addEventListener('animationend', () => heart.remove());
            }

            // Создаём 50 штук сразу при загрузке
            for (let i = 0; i < 50; i++) {
                setTimeout(createFloatingHeart, i * 20);
            }

            // И продолжаем создавать каждые 40 мс
            setInterval(createFloatingHeart, 40);

            // === 4. Управление музыкой ===
            const musicButton = document.getElementById('musicButton');
            const bgMusic = document.getElementById('bgMusic');

            musicButton.addEventListener('click', function() {
                bgMusic.play()
                    .then(() => {
                        musicButton.innerHTML = '🎵 Играет ❤️';
                        musicButton.classList.add('playing');
                    })
                    .catch(error => {
                        console.log('Автовоспроизведение заблокировано:', error);
                        alert('Нажмите ещё раз после взаимодействия со страницей');
                    });
            });

            // Опционально: попытка автостарта после клика по странице (если пользователь уже кликнул где-то)
            document.body.addEventListener('click', function initMusic() {
                bgMusic.play()
                    .then(() => {
                        musicButton.innerHTML = '🎵 Играет ❤️';
                        musicButton.classList.add('playing');
                        document.body.removeEventListener('click', initMusic);
                    })
                    .catch(() => {});
            }, { once: true });

        })();
    </script>
</body>
</html>
